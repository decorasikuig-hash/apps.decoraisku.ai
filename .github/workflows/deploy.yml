# Deploy to Hostinger via FTP for apps.decorasiku.com
name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Ambil Kode Terbaru (Checkout)
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install Dependensi
      run: npm install

    - name: 🏗️ Build Aplikasi
      run: npm run build

    - name: 📂 Unggah ke Hostinger via SFTP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 65002
        source: "dist/*"
        target: "public_html/apps/"
